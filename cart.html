<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart – Layla Binta Fast delivery</title>
  <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Nunito:wght@300;400;500;600;700&display=swap');

:root {
  --dark-green: #1B5E20;
  --mid-green: #2E7D32;
  --light-green: #66BB6A;
  --pale-green: #C8E6C9;
  --brown: #5D4037;
  --light-brown: #8D6E63;
  --cream: #FFF8F0;
  --white: #FFFFFF;
  --black: #1A1A1A;
  --gray: #6B7280;
  --light-gray: #F3F4F6;
  --border: #E5E7EB;
  --shadow: 0 4px 20px rgba(27, 94, 32, 0.12);
  --shadow-lg: 0 8px 40px rgba(27, 94, 32, 0.18);
  --radius: 14px;
  --radius-sm: 8px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--white);
  color: var(--black);
  line-height: 1.6;
  overflow-x: hidden;
}

h1, h2, h3, h4 {
  font-family: 'Playfair Display', serif;
}

a { text-decoration: none; color: inherit; }
img { max-width: 100%; height: auto; }
button { cursor: pointer; border: none; outline: none; font-family: 'Nunito', sans-serif; }
input, select, textarea { font-family: 'Nunito', sans-serif; outline: none; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--light-gray); }
::-webkit-scrollbar-thumb { background: var(--light-green); border-radius: 10px; }

/* ===== NAVBAR ===== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 1000;
  background: var(--dark-green);
  padding: 0 5%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
  box-shadow: 0 2px 20px rgba(0,0,0,0.25);
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo .logo-icon {
  width: 44px;
  height: 44px;
  background: var(--light-green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.nav-logo .brand-name {
  font-family: 'Playfair Display', serif;
  color: var(--white);
  font-size: 1.3rem;
  font-weight: 700;
  line-height: 1.1;
}

.nav-logo .brand-sub {
  color: var(--pale-green);
  font-size: 0.7rem;
  font-family: 'Nunito', sans-serif;
  font-weight: 400;
  letter-spacing: 1px;
  text-transform: uppercase;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: 6px;
  list-style: none;
}

.nav-links a {
  color: rgba(255,255,255,0.85);
  font-size: 0.95rem;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 5px;
}

.nav-links a:hover, .nav-links a.active {
  color: var(--white);
  background: rgba(255,255,255,0.15);
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.cart-btn {
  position: relative;
  background: var(--light-green);
  color: var(--white);
  padding: 9px 18px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
}

.cart-btn:hover { background: #81C784; transform: translateY(-1px); }

.cart-count {
  background: var(--brown);
  color: white;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  font-size: 0.7rem;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
}

.btn-login-nav {
  background: transparent;
  color: rgba(255,255,255,0.85);
  padding: 8px 16px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.9rem;
  border: 1.5px solid rgba(255,255,255,0.3);
  transition: var(--transition);
}

.btn-login-nav:hover {
  background: rgba(255,255,255,0.15);
  color: white;
  border-color: rgba(255,255,255,0.6);
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 5px;
}

.hamburger span {
  display: block;
  width: 26px;
  height: 2.5px;
  background: white;
  border-radius: 2px;
  transition: var(--transition);
}

/* ===== MOBILE NAV ===== */
.mobile-menu {
  display: none;
  position: fixed;
  top: 72px;
  left: 0;
  right: 0;
  background: var(--dark-green);
  padding: 20px 5%;
  z-index: 999;
  border-top: 1px solid rgba(255,255,255,0.1);
  flex-direction: column;
  gap: 4px;
}

.mobile-menu.active { display: flex; }

.mobile-menu a {
  color: rgba(255,255,255,0.85);
  font-weight: 600;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
}

.mobile-menu a:hover { background: rgba(255,255,255,0.1); color: white; }

/* ===== BUTTONS ===== */
.btn-primary {
  background: var(--dark-green);
  color: white;
  padding: 12px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 2px solid var(--dark-green);
}

.btn-primary:hover {
  background: var(--mid-green);
  border-color: var(--mid-green);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(27, 94, 32, 0.3);
}

.btn-secondary {
  background: transparent;
  color: var(--dark-green);
  padding: 11px 26px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  border: 2px solid var(--dark-green);
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.btn-secondary:hover {
  background: var(--dark-green);
  color: white;
  transform: translateY(-2px);
}

.btn-green {
  background: var(--light-green);
  color: white;
  padding: 12px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  border: 2px solid var(--light-green);
}

.btn-green:hover {
  background: #4CAF50;
  border-color: #4CAF50;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(102, 187, 106, 0.4);
}

.btn-danger {
  background: #EF5350;
  color: white;
  padding: 8px 18px;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.85rem;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.btn-danger:hover { background: #E53935; transform: translateY(-1px); }

.btn-whatsapp {
  background: #25D366;
  color: white;
  padding: 14px 32px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 1rem;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 10px;
  width: 100%;
  justify-content: center;
}

.btn-whatsapp:hover {
  background: #128C7E;
  transform: translateY(-2px);
  box-shadow: 0 6px 25px rgba(37, 211, 102, 0.4);
}

/* ===== HERO SECTION ===== */
.hero {
  min-height: 92vh;
  background: linear-gradient(135deg, #0A2E0D 0%, #1B5E20 40%, #2E7D32 70%, #388E3C 100%);
  display: flex;
  align-items: center;
  padding: 60px 5%;
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.hero-floating-1, .hero-floating-2, .hero-floating-3 {
  position: absolute;
  border-radius: 50%;
  opacity: 0.08;
  background: var(--light-green);
}

.hero-floating-1 { width: 400px; height: 400px; top: -100px; right: -100px; }
.hero-floating-2 { width: 250px; height: 250px; bottom: -50px; left: 10%; }
.hero-floating-3 { width: 150px; height: 150px; top: 30%; right: 25%; }

.hero-content {
  max-width: 600px;
  z-index: 1;
}

.hero-badge {
  background: rgba(102, 187, 106, 0.2);
  border: 1px solid rgba(102, 187, 106, 0.4);
  color: var(--pale-green);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 0.8rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  display: inline-block;
  margin-bottom: 20px;
}

.hero h1 {
  font-size: clamp(2.4rem, 5vw, 4rem);
  color: white;
  line-height: 1.15;
  margin-bottom: 20px;
  font-weight: 900;
}

.hero h1 span {
  color: var(--light-green);
  position: relative;
}

.hero p {
  color: rgba(255,255,255,0.8);
  font-size: 1.1rem;
  margin-bottom: 36px;
  line-height: 1.8;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.hero-btn-outline {
  background: transparent;
  color: white;
  padding: 12px 28px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 0.95rem;
  border: 2px solid rgba(255,255,255,0.5);
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.hero-btn-outline:hover {
  background: rgba(255,255,255,0.1);
  border-color: white;
}

.hero-stats {
  display: flex;
  gap: 32px;
  margin-top: 48px;
  padding-top: 32px;
  border-top: 1px solid rgba(255,255,255,0.15);
}

.stat-item { text-align: center; }
.stat-number {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 900;
  color: var(--light-green);
  display: block;
}
.stat-label { color: rgba(255,255,255,0.6); font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

.hero-image-side {
  position: absolute;
  right: 5%;
  top: 50%;
  transform: translateY(-50%);
  width: min(420px, 42%);
  z-index: 1;
}

.hero-emoji-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 30px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.product-preview-card {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 14px;
  padding: 16px 12px;
  text-align: center;
  transition: var(--transition);
  cursor: pointer;
}

.product-preview-card:hover { background: rgba(255,255,255,0.18); transform: translateY(-3px); }

.product-preview-card .emoji { font-size: 2.4rem; display: block; margin-bottom: 6px; }
.product-preview-card .pname { color: rgba(255,255,255,0.9); font-size: 0.78rem; font-weight: 700; display: block; }
.product-preview-card .pprice { color: var(--light-green); font-size: 0.82rem; font-weight: 700; display: block; margin-top: 3px; }

/* ===== SECTION STYLES ===== */
.section { padding: 80px 5%; }
.section-alt { background: var(--cream); }

.section-header { text-align: center; margin-bottom: 50px; }
.section-tag {
  color: var(--light-green);
  font-size: 0.8rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  display: block;
  margin-bottom: 10px;
}
.section-header h2 {
  font-size: clamp(1.8rem, 3.5vw, 2.8rem);
  color: var(--dark-green);
  margin-bottom: 14px;
}
.section-header p {
  color: var(--gray);
  max-width: 560px;
  margin: 0 auto;
  font-size: 1rem;
}

/* ===== CATEGORIES ===== */
.categories-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 16px;
}

.category-card {
  background: white;
  border: 2px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 16px;
  text-align: center;
  cursor: pointer;
  transition: var(--transition);
  text-decoration: none;
  display: block;
}

.category-card:hover {
  border-color: var(--light-green);
  transform: translateY(-5px);
  box-shadow: var(--shadow);
}

.category-card.active {
  border-color: var(--dark-green);
  background: var(--dark-green);
}

.category-card.active .cat-name { color: white; }
.category-card.active .cat-count { color: var(--pale-green); }

.cat-emoji { font-size: 2.8rem; display: block; margin-bottom: 10px; }
.cat-name { font-weight: 700; color: var(--dark-green); font-size: 0.95rem; display: block; }
.cat-count { color: var(--gray); font-size: 0.8rem; display: block; margin-top: 4px; }

/* ===== PRODUCT CARDS ===== */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 24px;
}

.product-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
  position: relative;
}

.product-card:hover {
  transform: translateY(-5px);
  box-shadow: var(--shadow-lg);
  border-color: var(--pale-green);
}

.product-img {
  height: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5rem;
  background: linear-gradient(135deg, var(--pale-green) 0%, #E8F5E9 100%);
  position: relative;
  overflow: hidden;
}

.product-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  position: absolute;
  inset: 0;
}

.product-badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: var(--dark-green);
  color: white;
  padding: 4px 10px;
  border-radius: 50px;
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.product-badge.out { background: #EF5350; }

.product-info { padding: 18px; }
.product-category-tag {
  color: var(--light-green);
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  display: block;
  margin-bottom: 6px;
}
.product-name {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--dark-green);
  margin-bottom: 6px;
  line-height: 1.3;
}
.product-desc {
  color: var(--gray);
  font-size: 0.82rem;
  line-height: 1.5;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.product-price {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  color: var(--dark-green);
}
.product-price span { font-size: 0.75rem; font-family: 'Nunito', sans-serif; font-weight: 600; color: var(--gray); }

.btn-add-cart {
  background: var(--dark-green);
  color: white;
  padding: 9px 16px;
  border-radius: 50px;
  font-size: 0.82rem;
  font-weight: 700;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}

.btn-add-cart:hover { background: var(--mid-green); transform: scale(1.03); }
.btn-add-cart:disabled { background: var(--gray); cursor: not-allowed; }

/* ===== WHY US SECTION ===== */
.features-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px;
}

.feature-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 32px 24px;
  text-align: center;
  transition: var(--transition);
}

.feature-card:hover { border-color: var(--light-green); transform: translateY(-4px); box-shadow: var(--shadow); }

.feature-icon {
  width: 64px;
  height: 64px;
  background: var(--pale-green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 18px;
  font-size: 1.8rem;
}

.feature-card h3 { font-size: 1rem; color: var(--dark-green); margin-bottom: 8px; }
.feature-card p { color: var(--gray); font-size: 0.88rem; line-height: 1.6; }

/* ===== CTA BANNER ===== */
.cta-banner {
  background: linear-gradient(135deg, var(--dark-green), var(--mid-green));
  padding: 70px 5%;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.cta-banner::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='20' cy='20' r='3'/%3E%3C/g%3E%3C/svg%3E");
}

.cta-banner h2 {
  color: white;
  font-size: clamp(1.8rem, 3vw, 2.8rem);
  margin-bottom: 14px;
  position: relative;
}

.cta-banner p {
  color: rgba(255,255,255,0.8);
  font-size: 1.05rem;
  margin-bottom: 30px;
  position: relative;
}

.cta-btn {
  background: var(--light-green);
  color: white;
  padding: 14px 36px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 1rem;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 8px;
  position: relative;
}

.cta-btn:hover {
  background: #81C784;
  transform: translateY(-3px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.2);
}

/* ===== FOOTER ===== */
footer {
  background: #0A1F0C;
  color: rgba(255,255,255,0.8);
  padding: 60px 5% 24px;
}

.footer-grid {
  display: grid;
  grid-template-columns: 1.5fr 1fr 1fr 1fr;
  gap: 40px;
  margin-bottom: 50px;
}

.footer-brand .brand-name {
  font-family: 'Playfair Display', serif;
  color: white;
  font-size: 1.4rem;
  font-weight: 700;
  display: block;
  margin-bottom: 4px;
}

.footer-brand p {
  font-size: 0.88rem;
  line-height: 1.7;
  color: rgba(255,255,255,0.6);
  margin-top: 12px;
}

.footer-col h4 {
  color: var(--light-green);
  font-size: 0.85rem;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.footer-col ul { list-style: none; }
.footer-col ul li { margin-bottom: 10px; }
.footer-col ul li a {
  color: rgba(255,255,255,0.6);
  font-size: 0.88rem;
  transition: var(--transition);
}
.footer-col ul li a:hover { color: var(--light-green); }

.footer-contact-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 0.88rem;
  color: rgba(255,255,255,0.6);
}

.footer-contact-item span:first-child { font-size: 1rem; }

.footer-bottom {
  border-top: 1px solid rgba(255,255,255,0.08);
  padding-top: 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
}

.footer-bottom p { font-size: 0.82rem; color: rgba(255,255,255,0.4); }

/* ===== SHOP PAGE ===== */
.shop-header {
  background: linear-gradient(135deg, var(--dark-green), var(--mid-green));
  padding: 50px 5%;
  color: white;
}

.shop-header h1 { font-size: 2.2rem; margin-bottom: 8px; }
.shop-header p { color: rgba(255,255,255,0.75); }

.breadcrumb {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
  color: rgba(255,255,255,0.6);
  margin-bottom: 14px;
}

.breadcrumb a { color: var(--pale-green); }
.breadcrumb span { opacity: 0.4; }

.shop-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 30px;
  padding: 40px 5%;
  align-items: start;
}

.shop-sidebar {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: sticky;
  top: 90px;
}

.sidebar-section { margin-bottom: 28px; }
.sidebar-section:last-child { margin-bottom: 0; }
.sidebar-section h3 {
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--dark-green);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--pale-green);
}

.filter-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 14px;
  border-radius: var(--radius-sm);
  background: var(--light-gray);
  border: none;
  width: 100%;
  text-align: left;
  font-size: 0.88rem;
  font-weight: 600;
  color: var(--gray);

}

.filter-btn:hover, .filter-btn.active {

}

.filter-btn .emoji { font-size: 1.1rem; }
.filter-btn .count {

}

.price-range-inputs {
  display: flex;
  gap: 10px;
  align-items: center;
}

.price-range-inputs input {

  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);

}

.price-range-inputs input:focus { border-color: var(--light-green); }

.shop-main-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 14px;
}

.results-count { color: var(--gray); font-size: 0.9rem; }
.results-count strong { color: var(--dark-green); }

.sort-select {
  padding: 9px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.88rem;
  color: var(--black);

  background: white;

}
.sort-select:focus { border-color: var(--light-green); }

/* ===== PRODUCT DETAIL ===== */
.product-detail-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 50px;
  padding: 50px 5%;
  max-width: 1200px;
  margin: 0 auto;
}

.product-detail-img {
  background: linear-gradient(135deg, var(--pale-green) 0%, #E8F5E9 100%);
  border-radius: 20px;
  height: 420px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8rem;
  position: sticky;
  top: 100px;
  overflow: hidden;
}

.product-detail-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.product-detail-info { padding-top: 10px; }
.detail-category {
  color: var(--light-green);
  font-size: 0.8rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
  display: block;
  margin-bottom: 10px;
}
.detail-title {
  font-size: clamp(1.5rem, 2.5vw, 2.2rem);
  color: var(--dark-green);
  margin-bottom: 14px;
  line-height: 1.2;
}
.detail-price {
  font-family: 'Playfair Display', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--dark-green);
  margin-bottom: 20px;
}
.detail-price span { font-family: 'Nunito', sans-serif; font-size: 1rem; color: var(--gray); }

.detail-stock {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 50px;
  font-size: 0.82rem;
  font-weight: 700;
  margin-bottom: 20px;
}

.detail-stock.in { background: #E8F5E9; color: var(--dark-green); }
.detail-stock.out { background: #FFEBEE; color: #C62828; }

.detail-desc {
  color: var(--gray);
  line-height: 1.8;
  margin-bottom: 28px;
  font-size: 0.95rem;
}

.qty-selector {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 24px;
  width: fit-content;
  border: 1.5px solid var(--border);
  border-radius: 50px;
  overflow: hidden;
}

.qty-btn {
  background: var(--light-gray);
  border: none;
  width: 42px;
  height: 42px;
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--dark-green);
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.qty-btn:hover { background: var(--pale-green); }

.qty-input {
  width: 56px;
  text-align: center;
  border: none;
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--dark-green);
  background: white;
}

.detail-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.detail-tabs {
  border-top: 2px solid var(--border);
  margin-top: 40px;
  padding-top: 30px;
}

.tab-buttons {
  display: flex;
  gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 24px;
}

.tab-btn {
  padding: 10px 22px;
  font-weight: 700;
  font-size: 0.9rem;
  color: var(--gray);
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  background: none;
  transition: var(--transition);
}

.tab-btn.active { color: var(--dark-green); border-bottom-color: var(--dark-green); }
.tab-btn:hover { color: var(--dark-green); }

.tab-content { display: none; color: var(--gray); line-height: 1.8; font-size: 0.9rem; }
.tab-content.active { display: block; }

/* ===== CART PAGE ===== */
.cart-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 30px;
  padding: 40px 5%;
  align-items: start;
}

.cart-items-section {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.cart-table-header {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 40px;
  gap: 16px;
  padding: 14px 20px;
  background: var(--light-gray);
  font-size: 0.78rem;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gray);
}

.cart-item-row {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr 40px;
  gap: 16px;
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  transition: var(--transition);
}

.cart-item-row:hover { background: var(--cream); }

.cart-item-info {
  display: flex;
  align-items: center;
  gap: 14px;
}

.cart-item-emoji {
  width: 60px;
  height: 60px;
  background: var(--pale-green);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  flex-shrink: 0;
  overflow: hidden;
}

.cart-item-emoji img { width: 100%; height: 100%; object-fit: cover; }

.cart-item-name { font-weight: 700; font-size: 0.92rem; color: var(--dark-green); }
.cart-item-cat { font-size: 0.78rem; color: var(--gray); margin-top: 2px; }

.cart-qty-selector {
  display: flex;
  align-items: center;
  border: 1.5px solid var(--border);
  border-radius: 50px;
  overflow: hidden;
  width: fit-content;
}

.cart-qty-btn {
  background: var(--light-gray);
  border: none;
  width: 30px;
  height: 30px;
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--dark-green);
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.cart-qty-btn:hover { background: var(--pale-green); }

.cart-qty-display {
  width: 36px;
  text-align: center;
  font-size: 0.88rem;
  font-weight: 700;
  color: var(--dark-green);
}

.cart-price { font-weight: 700; color: var(--dark-green); font-size: 0.92rem; }
.cart-subtotal { font-weight: 800; color: var(--dark-green); font-size: 1rem; }

.cart-remove-btn {
  background: none;
  border: none;
  color: #EF5350;
  font-size: 1.1rem;
  cursor: pointer;
  transition: var(--transition);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cart-remove-btn:hover { background: #FFEBEE; color: #C62828; }

.cart-empty {
  padding: 80px 20px;
  text-align: center;
}

.cart-empty .empty-emoji { font-size: 5rem; display: block; margin-bottom: 20px; }
.cart-empty h3 { color: var(--dark-green); font-size: 1.4rem; margin-bottom: 10px; }
.cart-empty p { color: var(--gray); margin-bottom: 24px; }

.cart-summary {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  position: sticky;
  top: 90px;
}

.cart-summary h3 {
  font-size: 1.1rem;
  color: var(--dark-green);
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--border);
}

.summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 0;
  font-size: 0.9rem;
  color: var(--gray);
  border-bottom: 1px solid var(--border);
}

.summary-row:last-of-type { border-bottom: none; }
.summary-row.total {
  font-weight: 800;
  font-size: 1.05rem;
  color: var(--dark-green);
  padding-top: 16px;
  margin-top: 4px;
}

/* ===== CHECKOUT PAGE ===== */
.checkout-layout {
  display: grid;
  grid-template-columns: 1fr 380px;
  gap: 30px;
  padding: 40px 5%;
  align-items: start;
}

.form-section {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
  margin-bottom: 20px;
}

.form-section h3 {
  font-size: 1rem;
  color: var(--dark-green);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--pale-green);
  display: flex;
  align-items: center;
  gap: 8px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--dark-green);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input, .form-group select, .form-group textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 0.9rem;
  transition: var(--transition);
  background: white;
  color: var(--black);
}

.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--light-green);
  box-shadow: 0 0 0 3px rgba(102, 187, 106, 0.15);
}

.payment-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.payment-option {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: var(--transition);
}

.payment-option:hover { border-color: var(--light-green); }
.payment-option.selected { border-color: var(--dark-green); background: #F1F8E9; }
.payment-option input[type="radio"] { accent-color: var(--dark-green); width: 16px; height: 16px; }
.payment-option .pay-icon { font-size: 1.6rem; }
.payment-option .pay-label { font-weight: 700; font-size: 0.9rem; color: var(--dark-green); }
.payment-option .pay-desc { font-size: 0.78rem; color: var(--gray); margin-top: 2px; }

.payment-details {
  margin-top: 16px;
  padding: 16px;
  background: var(--cream);
  border-radius: var(--radius-sm);
  border-left: 3px solid var(--light-green);
  display: none;
}

.payment-details.visible { display: block; }
.payment-details p { font-size: 0.88rem; color: var(--gray); line-height: 1.7; }
.payment-details strong { color: var(--dark-green); }

/* ===== AUTH PAGES ===== */
.auth-page {
  min-height: 100vh;
  background: linear-gradient(135deg, #0A2E0D 0%, #1B5E20 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 5%;
  position: relative;
  overflow: hidden;
}

.auth-page::before {
  content: '';
  position: absolute;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4z'/%3E%3C/g%3E%3C/svg%3E");
}

.auth-card {
  background: white;
  border-radius: 24px;
  padding: 44px 40px;
  width: 100%;
  max-width: 460px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  position: relative;
  z-index: 1;
}

.auth-logo {
  text-align: center;
  margin-bottom: 30px;
}

.auth-logo .logo-icon {
  width: 60px;
  height: 60px;
  background: var(--pale-green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 1.8rem;
}

.auth-logo h1 {
  font-size: 1.5rem;
  color: var(--dark-green);
  margin-bottom: 4px;
}

.auth-logo p { color: var(--gray); font-size: 0.88rem; }

.auth-tabs {
  display: grid;
  grid-template-columns: 1fr 1fr;
  border: 2px solid var(--border);
  border-radius: 50px;
  overflow: hidden;
  margin-bottom: 28px;
}

.auth-tab {
  padding: 10px;
  text-align: center;
  font-weight: 700;
  font-size: 0.88rem;
  color: var(--gray);
  background: none;
  transition: var(--transition);
}

.auth-tab.active {
  background: var(--dark-green);
  color: white;
  border-radius: 50px;
}

.auth-form { display: none; }
.auth-form.active { display: block; }

.auth-divider {
  text-align: center;
  margin: 20px 0;
  position: relative;
  color: var(--gray);
  font-size: 0.82rem;
}

.auth-divider::before, .auth-divider::after {
  content: '';
  position: absolute;
  top: 50%;
  width: 42%;
  height: 1px;
  background: var(--border);
}

.auth-divider::before { left: 0; }
.auth-divider::after { right: 0; }

.error-msg {
  background: #FFEBEE;
  color: #C62828;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  margin-bottom: 16px;
  display: none;
  align-items: center;
  gap: 8px;
}

.error-msg.visible { display: flex; }

.success-msg {
  background: #E8F5E9;
  color: #1B5E20;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  margin-bottom: 16px;
  display: none;
  align-items: center;
  gap: 8px;
}

.success-msg.visible { display: flex; }

/* ===== DASHBOARD ===== */
.dashboard-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: calc(100vh - 72px);
}

.dashboard-sidebar {
  background: var(--dark-green);
  padding: 30px 0;
  position: sticky;
  top: 72px;
  height: calc(100vh - 72px);
  overflow-y: auto;
}

.dash-user-info {
  padding: 0 20px 24px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  margin-bottom: 16px;
  text-align: center;
}

.dash-avatar {
  width: 60px;
  height: 60px;
  background: var(--light-green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.6rem;
  margin: 0 auto 10px;
  color: white;
}

.dash-name { color: white; font-weight: 700; font-size: 0.95rem; }
.dash-email { color: rgba(255,255,255,0.5); font-size: 0.78rem; margin-top: 2px; }
.dash-role {
  background: var(--light-green);
  color: white;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 10px;

}

.dash-nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  color: rgba(255,255,255,0.7);
  font-weight: 600;
  font-size: 0.9rem;
  transition: var(--transition);
}

.dash-nav a:hover, .dash-nav a.active {
  background: rgba(255,255,255,0.1);

}

.dash-nav a .icon { font-size: 1.1rem; width: 22px; text-align: center; }

.dashboard-main {
  padding: 36px;
  background: var(--light-gray);
}

.dash-greeting {
  margin-bottom: 28px;
}

.dash-greeting h2 { font-size: 1.6rem; color: var(--dark-green); }
.dash-greeting p { color: var(--gray); margin-top: 4px; }

.stats-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 18px;
  margin-bottom: 30px;
}

.stat-card {

  border-radius: var(--radius);

}

.stat-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.stat-card-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.3rem;
}

.stat-card-icon.green { background: var(--pale-green); }
.stat-card-icon.brown { background: #EFEBE9; }
.stat-card-icon.blue { background: #E3F2FD; }
.stat-card-icon.orange { background: #FFF3E0; }

.stat-card-value {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--dark-green);

}

.stat-card-label { font-size: 0.8rem; color: var(--gray); font-weight: 600; }

.dash-section {
  background: white;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  padding: 24px;
  margin-bottom: 24px;
}

.dash-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 2px solid var(--border);
}

.dash-section-header h3 { font-size: 1rem; color: var(--dark-green); }

/* ===== ADMIN PANEL ===== */
.admin-layout {
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: calc(100vh - 72px);
}

.admin-sidebar {
  background: #0A1F0C;
  padding: 24px 0;
  position: sticky;
  top: 72px;
  height: calc(100vh - 72px);
  overflow-y: auto;
}

.admin-brand {

}

.admin-brand .logo { font-size: 2rem; }
.admin-brand h3 {
  color: white;
  font-size: 0.9rem;
  margin-top: 8px;
  font-family: 'Nunito', sans-serif;
}

.admin-brand span { color: var(--light-green); font-size: 0.75rem; }

.admin-nav { padding: 0 10px; }
.admin-nav a {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  color: rgba(255,255,255,0.6);
  font-weight: 600;
  font-size: 0.88rem;
  border-radius: var(--radius-sm);
  transition: var(--transition);

}

}

.admin-nav .nav-icon { font-size: 1rem; width: 20px; text-align: center; }

.admin-header {

.admin-header p { color: var(--gray); font-size: 0.85rem; margin-top: 2px; }

.admin-panel { display: none; }

/* ===== DATA TABLE ===== */
.data-table-wrap { overflow-x: auto; }
.data-table {

  font-size: 0.88rem;
}

.data-table th {
  background: var(--light-gray);
  padding: 12px 14px;
  text-align: left;
  font-weight: 800;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--gray);
  border-bottom: 2px solid var(--border);
}

.data-table td {
  padding: 14px;
  border-bottom: 1px solid var(--border);
  color: var(--black);
  vertical-align: middle;
}

      const def = DEFAULT_PRODUCTS.find(d => d.id === p.id);
      if (def && def.image && p.image !== def.image) {
        updated = true;
        return { ...p, image: def.image, emoji: def.emoji };
      }
      return p;
    });
    if (updated) localStorage.setItem('products', JSON.stringify(parsed));
    return parsed;
  },

  save(products) {
    localStorage.setItem('products', JSON.stringify(products));
  },

  getById(id) {
    return this.getAll().find(p => p.id === id);
  },

  getByCategory(category) {
    if (!category || category === 'All') return this.getAll();
    return this.getAll().filter(p => p.category === category);
  },

  getFeatured() {
    return this.getAll().filter(p => p.featured).slice(0, 8);
  },

  add(product) {
    const products = this.getAll();
    product.id = 'p' + Date.now();
    products.push(product);
    this.save(products);
    return product;
  },

  update(id, updates) {
    const products = this.getAll();
    const idx = products.findIndex(p => p.id === id);
    if (idx !== -1) {
      products[idx] = { ...products[idx], ...updates };
      this.save(products);
      return products[idx];
    }
    return null;
  },

  delete(id) {
    const products = this.getAll().filter(p => p.id !== id);
    this.save(products);
  },

  getCategories() {
    const products = this.getAll();
    const cats = ['All', ...new Set(products.map(p => p.category))];
    return cats;
  },

  getCategoryCounts() {
    const products = this.getAll();
    const counts = {};
    products.forEach(p => {
      counts[p.category] = (counts[p.category] || 0) + 1;
    });
    return counts;
  }
};

// Category emojis mapping
const CATEGORY_EMOJIS = {
  'All': '🛒',
  'Goats': '🐐',
  'Chickens': '🐔',
  'Eggs': '🥚',
  'Fruits': '🥭',
  'Farm Foods': '🌾'
};

// Format price in GMD
function formatPrice(price) {
  return 'GMD ' + Number(price).toLocaleString();
}

// Get product emoji display
function getProductEmoji(product) {
  return product.emoji || CATEGORY_EMOJIS[product.category] || '📦';
}

// ===== AUTH MANAGER =====

const DEFAULT_ADMIN = {
  id: 'admin001',
  name: 'Admin',
  email: 'admin@leilabinta.com',
  password: 'admin123',
  role: 'admin',
  createdAt: new Date().toISOString()
};

const AuthManager = {
  initUsers() {
    const users = localStorage.getItem('users');
    if (!users) {
      localStorage.setItem('users', JSON.stringify([DEFAULT_ADMIN]));
    } else {
      // Ensure admin always exists
      const parsed = JSON.parse(users);
      const hasAdmin = parsed.find(u => u.email === 'admin@leilabinta.com');
      if (!hasAdmin) {
        parsed.push(DEFAULT_ADMIN);
        localStorage.setItem('users', JSON.stringify(parsed));
      }
    }
  },

  getUsers() {
    this.initUsers();
    return JSON.parse(localStorage.getItem('users') || '[]');
  },

  saveUsers(users) {
    localStorage.setItem('users', JSON.stringify(users));
  },

  getCurrentUser() {
    const u = localStorage.getItem('currentUser');
    return u ? JSON.parse(u) : null;
  },

  register(name, email, password) {
    const users = this.getUsers();
    if (users.find(u => u.email.toLowerCase() === email.toLowerCase())) {
      return { success: false, error: 'Email already registered.' };
    }
    const newUser = {
      id: 'u' + Date.now(),
      name,
      email,
      password,
      role: 'customer',
      createdAt: new Date().toISOString()
    };
    users.push(newUser);
    this.saveUsers(users);
    return { success: true, user: newUser };
  },

  login(email, password) {
    const users = this.getUsers();
    const user = users.find(
      u => u.email.toLowerCase() === email.toLowerCase() && u.password === password
    );
    if (!user) return { success: false, error: 'Invalid email or password.' };
    localStorage.setItem('currentUser', JSON.stringify(user));
    return { success: true, user };
  },

  logout() {
    localStorage.removeItem('currentUser');
    window.location.href = 'login.html';
  },

  isLoggedIn() {
    return !!this.getCurrentUser();
  },

  isAdmin() {
    const u = this.getCurrentUser();
    return u && u.role === 'admin';
  },

  requireAuth(redirect = 'login.html') {
    if (!this.isLoggedIn()) {
      window.location.href = redirect;
      return false;
    }
    return true;
  },

  requireAdmin() {
    if (!this.isAdmin()) {
      window.location.href = 'index.html';
      return false;
    }
    return true;
  },

  updateNavAuth() {
    const user = this.getCurrentUser();
    const loginLinks = document.querySelectorAll('.nav-login-link');
    const userMenus = document.querySelectorAll('.nav-user-menu');
    const adminLinks = document.querySelectorAll('.nav-admin-link');

    if (user) {
      loginLinks.forEach(el => el.classList.add('hidden'));
      userMenus.forEach(el => {
        el.classList.remove('hidden');
        const nameEl = el.querySelector('.user-name');
        if (nameEl) nameEl.textContent = user.name.split(' ')[0];
      });
      if (user.role === 'admin') {
        adminLinks.forEach(el => el.classList.remove('hidden'));
      }
    } else {
      loginLinks.forEach(el => el.classList.remove('hidden'));
      userMenus.forEach(el => el.classList.add('hidden'));
      adminLinks.forEach(el => el.classList.add('hidden'));
    }
  }
};

// ===== CART MANAGER =====

const CartManager = {
  getCart() {
    const cart = localStorage.getItem('cart');
    return cart ? JSON.parse(cart) : [];
  },

  saveCart(cart) {
    localStorage.setItem('cart', JSON.stringify(cart));
    this.updateCartUI();
  },

  addItem(productId, quantity = 1) {
    const product = ProductManager.getById(productId);
    if (!product) return { success: false, error: 'Product not found.' };
    if (product.stock < 1) return { success: false, error: 'Product out of stock.' };

    const cart = this.getCart();
    const existing = cart.find(i => i.productId === productId);

    if (existing) {
      const newQty = existing.quantity + quantity;
      if (newQty > product.stock) {
        return { success: false, error: `Only ${product.stock} items available in stock.` };
      }
      existing.quantity = newQty;
    } else {
      cart.push({
        productId,
        name: product.name,
        category: product.category,
        price: product.price,
        quantity,
        emoji: getProductEmoji(product)
      });
    }

    this.saveCart(cart);
    return { success: true };
  },

  removeItem(productId) {
    const cart = this.getCart().filter(i => i.productId !== productId);
    this.saveCart(cart);
  },

  updateQuantity(productId, quantity) {
    const product = ProductManager.getById(productId);
    if (!product) return;

    if (quantity <= 0) {
      this.removeItem(productId);
      return;
    }

    if (quantity > product.stock) {
      showToast(`Only ${product.stock} items available in stock.`, 'warning');
      quantity = product.stock;
    }

    const cart = this.getCart();
    const item = cart.find(i => i.productId === productId);
    if (item) {
      item.quantity = quantity;
      this.saveCart(cart);
    }
  },

  clearCart() {
    localStorage.removeItem('cart');
    this.updateCartUI();
  },

  getItemCount() {
    return this.getCart().reduce((sum, item) => sum + item.quantity, 0);
  },

  getSubtotal() {
    return this.getCart().reduce((sum, item) => sum + (item.price * item.quantity), 0);
  },

  getTotal() {
    const subtotal = this.getSubtotal();
    const delivery = subtotal > 0 ? 150 : 0;
    return subtotal + delivery;
  },

  updateCartUI() {
    const count = this.getItemCount();
    document.querySelectorAll('.cart-count').forEach(el => {
      el.textContent = count;
      el.style.display = count > 0 ? 'flex' : 'none';
    });
  }
};

// ===== TOAST NOTIFICATION =====
function showToast(message, type = 'success') {
  const icons = { success: '✅', error: '❌', warning: '⚠️', info: 'ℹ️' };
  const container = document.getElementById('toast-container') || createToastContainer();

  const toast = document.createElement('div');
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    <span class="toast-icon">${icons[type]}</span>
    <span class="toast-msg">${message}</span>
  `;

  container.appendChild(toast);

  setTimeout(() => {
    toast.style.animation = 'slideOutRight 0.3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function createToastContainer() {
  const container = document.createElement('div');
  container.id = 'toast-container';
  container.className = 'toast-container';
  document.body.appendChild(container);
  return container;
}

// Init cart UI on every page
document.addEventListener('DOMContentLoaded', () => {
  CartManager.updateCartUI();
});
